# render.yaml
services:
  # Backend Service (Django + Gunicorn)
  - type: web
    name: cluster-analysis-backend # Choose a name (used in frontend nginx.conf)
    env: docker # Specify Docker environment
    repo: https://github.com/Nicholas-Eugene/cluster-analysis-web.git # Replace with your repo URL
    region: singapore # Choose a region close to you, e.g., singapore, frankfurt
    dockerfilePath: ./backend/Dockerfile
    plan: free # Or choose a paid plan
    healthCheckPath: /api/health # Add a simple health check endpoint in Django if possible
    envVars:
      - key: PYTHON_VERSION
        value: 3.9 # Match Dockerfile
      - key: DJANGO_SECRET_KEY
        generateValue: true # Let Render generate a secret key
      - key: DJANGO_DEBUG
        value: False
      - key: DJANGO_ALLOWED_HOSTS
        value: your-frontend-service-name.onrender.com,your-custom-domain.com # Add frontend URL and any custom domains
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        value: https://your-frontend-service-name.onrender.com,https://your-custom-domain.com # Must be HTTPS
      # - key: DATABASE_URL # Uncomment if using Render PostgreSQL
      #   fromDatabase:
      #     name: your-database-name # Replace with your Render DB name
      #     property: connectionString
    autoDeploy: true # Optional: Deploy automatically on push to main branch
    # If using whitenoise for static files (e.g., admin), add build & start commands:
    buildFilter:
        paths:
          - backend/**
    buildCommand: |
        pip install --upgrade pip
        pip install -r backend/requirements.txt
        # cd backend # Ensure commands run in the correct directory if needed
        python backend/manage.py collectstatic --noinput
        # python backend/manage.py migrate # Run migrations (important if using DB)
    startCommand: gunicorn backend.backend.wsgi:application --bind 0.0.0.0:8000
    # If using Dockerfile CMD directly:
    # buildCommand: "" # No build command needed if Dockerfile does it all
    # startCommand: "" # Start command defined in Dockerfile CMD

  # Frontend Service (Vue.js + Nginx)
  - type: web
    name: cluster-analysis-frontend # Choose a name
    env: docker
    repo: https://github.com/Nicholas-Eugene/cluster-analysis-web.git # Replace with your repo URL
    region: singapore # Match backend region if possible
    dockerfilePath: ./fuzzy-clustering-frontend/Dockerfile
    plan: free # Or choose a paid plan
    envVars:
      - key: NODE_VERSION
        value: 18 # Match Dockerfile
      - key: VITE_API_BASE_URL # This doesn't directly configure Nginx, but good practice
        value: /api
      # Optional: Pass backend URL to Nginx dynamically (requires modifying nginx.conf template)
      # - key: BACKEND_URL
      #   fromService:
      #     type: web
      #     name: cluster-analysis-backend # Must match backend service name
      #     property: url # Use Render's internal URL or public URL
    autoDeploy: true
    buildFilter:
        paths:
          - fuzzy-clustering-frontend/**
    # Set build args for frontend Dockerfile
    # dockerBuildArgs:
    #   VITE_API_BASE_URL: "/api" # Define the build argument for VITE_API_BASE_URL

# Optional: Add a PostgreSQL Database (if needed, replace SQLite)
# databases:
#   - name: your-database-name # Choose a name
#     region: singapore
#     plan: free # Or choose a paid plan
#     postgresMajorVersion: 14 # Choose a version